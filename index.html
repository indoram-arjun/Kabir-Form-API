<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabir Properties Inquiry Form</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f7fa;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #fff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #222;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            background: #111;
            color: #fff;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        #status {
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Kabir Properties Inquiry Form</h1>

        <form id="propertyForm">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Property Type</label>
                <select id="propertyType" required>
                    <option value="">Select</option>
                    <option>Plot</option>
                    <option>Flat</option>
                    <option>House</option>
                    <option>Commercial</option>
                </select>
            </div>

            <div class="form-group">
                <label>Budget</label>
                <input type="text" id="budget" required>
            </div>

            <div class="form-group">
                <label>Preferred Location</label>
                <input type="text" id="location" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea id="message"></textarea>
            </div>

            <button type="submit">Submit Inquiry</button>

            <p id="status"></p>

        </form>
    </div>

    <script>
        const form = document.getElementById("propertyForm");
        const status = document.getElementById("status");

        /* STEP IMPORTANT:
        Yahan apna Google Apps Script Web App URL paste karna hai
        */

        const scriptURL = "https://script.google.com/macros/s/AKfycbwBJtPBxcPDPgMrBX9HnCtLfYKQEfU-M_dgXZMat9h8pWTP_jP9p5nANI8CQhr6T3X6/exec";

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = {
                name: document.getElementById("name").value,
                phone: document.getElementById("phone").value,
                email: document.getElementById("email").value,
                propertyType: document.getElementById("propertyType").value,
                budget: document.getElementById("budget").value,
                location: document.getElementById("location").value,
                message: document.getElementById("message").value
            };

            status.innerText = "Submitting...";

            try {
                const response = await fetch(scriptURL, {
                    method: "POST",
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.result === "success") {
                    status.innerText = "Form Submitted Successfully!";
                    form.reset();
                } else {
                    status.innerText = "Something went wrong.";
                }

            } catch (error) {
                status.innerText = "Submission Failed.";
            }
        });
    </script>

</body>

</html>
